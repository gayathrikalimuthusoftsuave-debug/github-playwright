<html>
<head>

        img { width: 400px; margin-top: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<h1>Automation Test Report</h1>

        <th>Status</th>
        <th>Message</th>
        <th>Screenshot</th>
    </tr>
    </thead>
    <tbody id="reportBody"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
